# Pre-commit hooks. Install with: uv run pre-commit install
# Run on all files with: uv run pre-commit run --all-files
# (Hook tool environments use whatever Python pre-commit finds on PATH; the
#  linters target py313 via their own config, so their runtime version is moot.)

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: detect-private-key  # belt-and-braces against committing secrets (golden rule #10)

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.5.5
    hooks:
      - id: ruff
        args: [--fix]
        files: ^(extract|infra/scripts)/
      - id: ruff-format
        files: ^(extract|infra/scripts)/

  - repo: https://github.com/psf/black
    rev: 24.8.0
    hooks:
      - id: black
        files: ^(extract|infra/scripts)/

  # NOTE: sqlfluff uses the dbt templater (see .sqlfluff), which needs a compiled
  # dbt project + a live Postgres connection — impractical in an isolated pre-commit
  # env. It is enforced in CI instead (GitHub Actions, with a Postgres service
  # container; Phase 7). Run locally with:
  #   set -a; source .env; set +a; sqlfluff lint transform/models
