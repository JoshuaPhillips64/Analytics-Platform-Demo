name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  dbt:
    name: lint + dbt build (Postgres service)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: equities
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      # dbt + sqlfluff read these (profiles.yml is env-var based). The CI Postgres
      # service stands in for RDS; a committed fixture stands in for raw.* data.
      DB_HOST: localhost
      DB_PORT: "5432"
      DB_NAME: equities
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_SSLMODE: prefer

    defaults:
      run:
        working-directory: transform

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dbt + sqlfluff
        run: |
          python -m pip install --upgrade pip
          pip install "dbt-core>=1.10,<1.12" "dbt-postgres>=1.10,<1.12" \
                      "sqlfluff>=3.1" "sqlfluff-templater-dbt>=3.1"

      - name: dbt deps
        run: dbt deps

      - name: Load raw fixture into the Postgres service
        run: psql "postgresql://postgres:postgres@localhost:5432/equities" -v ON_ERROR_STOP=1 -f ../.github/ci/seed_raw_fixture.sql

      - name: sqlfluff lint
        run: sqlfluff lint models

      - name: dbt parse
        run: dbt parse --target ci --profiles-dir .

      - name: dbt seed + build (runs every model AND every test)
        # dbt build exits non-zero if any model errors or any test fails, which
        # fails the job and blocks the merge. (No --warn-error: package-level
        # deprecation warnings shouldn't fail CI.)
        run: |
          dbt seed --target ci --profiles-dir .
          dbt build --target ci --profiles-dir .

      - name: dbt docs generate (artifact)
        run: dbt docs generate --target ci --profiles-dir .

      - name: Upload dbt docs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dbt-docs
          path: |
            transform/target/manifest.json
            transform/target/catalog.json
            transform/target/index.html
          if-no-files-found: ignore
